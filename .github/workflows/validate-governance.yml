name: Validate Governance Files

on:
  push:
    branches:
      - main
      - develop
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate JSON files
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          for p in Path('.').rglob('*.json'):
              with open(p, 'r', encoding='utf-8') as f:
                  json.load(f)
              print(f'validated {p}')
          PY

      - name: Check required root files
        run: |
          test -f README.md
          test -f CHANGELOG.md
          test -f CODEOWNERS
